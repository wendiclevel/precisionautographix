name: Deploy to DreamHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SCP to DreamHost
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DREAMHOST_HOST }}
          username: ${{ secrets.DREAMHOST_USER }}
          password: ${{ secrets.DREAMHOST_PASS }}
          port: 22
          source: "index.html,css/"
          target: ${{ secrets.DREAMHOST_PATH }}
