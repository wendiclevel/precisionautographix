name: Deploy to DreamHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync
        run: |
          sshpass -p "${{ secrets.DREAMHOST_PASS }}" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            index.html compliance.html compliance-checker.html css images \
            ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}:${{ secrets.DREAMHOST_PATH }}/
